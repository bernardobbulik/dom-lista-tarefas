<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <h1>To-Do Manager</h1>
            <p>Planeje seu dia e crie suas tarefas.</p>
        </header>

        <section class="hero-actions">
            <input id="task-input" type="text" placeholder="Digite sua nova tarefa...">
            <button id="add-task-btn" type="button" aria-label="Adicionar tarefa">+</button>
        </section>

        <section class="content">
            <div id="task-grid" class="content-cards">
                
                
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
